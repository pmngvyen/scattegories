<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scattergories</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;800;900&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B0B0B;
    --paper:#FFFFFF;
    --rule:#D6D6D6;
    --mute:#767676;
    --wash:#F2F2F2;
    --display:"Archivo","Helvetica Neue",Helvetica,Arial,sans-serif;
    --mono:"Roboto Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }

  *,*::before,*::after{box-sizing:border-box;border-radius:0!important;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--display);
    -webkit-font-smoothing:antialiased;
    line-height:1.45;
    padding:22px;
    overflow:hidden;
  }
  button,input,select{font:inherit;color:inherit;border-radius:0;}
  :focus-visible{outline:2px solid var(--ink);outline-offset:2px;}

  .frame{
    height:100%;max-width:1680px;margin:0 auto;border:1px solid var(--ink);
    display:flex;flex-direction:column;overflow:hidden;
  }

  /* ---------- masthead ---------- */
  header{
    display:flex;align-items:baseline;justify-content:space-between;gap:24px;
    padding:clamp(14px,2.2vh,26px) 34px;border-bottom:1px solid var(--ink);flex-shrink:0;
  }
  .wordmark{
    font-size:clamp(26px,4.6vh,54px);font-weight:900;letter-spacing:-.045em;
    text-transform:uppercase;margin:0;line-height:1;
  }
  .tag{
    font-family:var(--mono);font-size:11px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--mute);
  }

  /* ---------- main grid ---------- */
  .board{display:grid;grid-template-columns:minmax(0,400px) minmax(0,1fr);flex:1;min-height:0;}
  .rail{border-right:1px solid var(--ink);display:flex;flex-direction:column;min-height:0;}
  .list-col{display:flex;flex-direction:column;min-height:0;}

  /* ---------- letter ---------- */
  .letter-panel{
    background:var(--paper);color:var(--ink);padding:clamp(14px,2vh,24px) 26px;
    flex:0 0 44%;min-height:0;display:flex;flex-direction:column;position:relative;
  }
  .letter-panel .panel-label{
    color:var(--mute);position:absolute;top:clamp(14px,2vh,24px);left:26px;right:26px;
  }
  .panel-label{
    font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    display:flex;justify-content:space-between;align-items:center;
  }
  .letter{
    font-size:min(15vw,21vh);font-weight:900;letter-spacing:0;
    line-height:.82;text-align:center;margin:0;user-select:none;
    flex:1;min-height:0;display:flex;align-items:center;justify-content:center;
  }
  .letter span{display:block;}
  .reroll{
    width:100%;background:var(--paper);border:1px solid var(--ink);padding:clamp(9px,1.4vh,13px) 0;
    font-weight:600;font-size:13px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;flex-shrink:0;
  }
  .reroll:hover{background:var(--ink);color:var(--paper);}
  .letter.roll{animation:flick .34s steps(6) 1;}
  @keyframes flick{0%{opacity:.15}50%{opacity:.55}100%{opacity:1}}
  @media (prefers-reduced-motion:reduce){.letter.roll{animation:none}}
  .letter-note{
    font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;
    text-align:center;color:#9A9A9A;
  }

  /* ---------- timer ---------- */
  .timer-panel{
    padding:clamp(14px,2vh,24px) 26px clamp(24px,3.8vh,42px);border-top:1px solid var(--rule);
    flex:1;min-height:0;display:flex;flex-direction:column;justify-content:space-between;
    gap:clamp(7px,1.2vh,13px);
  }
  .rail .timer-panel{border-top:1px solid var(--ink);}
  .clock{
    font-family:var(--display);font-weight:800;font-size:min(8vw,12vh);
    letter-spacing:-.03em;line-height:1;margin:0;
    font-variant-numeric:tabular-nums;font-feature-settings:"zero" 0,"ss01" 0;
  }
  .clock.done{animation:blink 1s steps(1) infinite;}
  @keyframes blink{50%{opacity:.18}}
  @media (prefers-reduced-motion:reduce){.clock.done{animation:none;}}
  .track{height:4px;background:var(--wash);border:1px solid var(--rule);flex-shrink:0;}
  .fill{height:100%;background:var(--ink);width:100%;transition:width .25s linear;}

  .presets{display:flex;margin:0;border:1px solid var(--ink);}
  .presets button{
    flex:1;background:var(--paper);border:0;border-right:1px solid var(--ink);
    padding:clamp(6px,1.1vh,9px) 0;font-family:var(--display);font-weight:600;
    font-size:13px;cursor:pointer;letter-spacing:.04em;font-variant-numeric:tabular-nums;
  }
  .presets button:last-child{border-right:0;}
  .presets button[aria-pressed="true"]{background:var(--ink);color:var(--paper);}
  .presets button:hover{background:var(--wash);}
  .presets button[aria-pressed="true"]:hover{background:var(--ink);}

  .custom{display:flex;align-items:center;gap:8px;margin-top:0;}
  .custom label{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--mute);}
  .custom input{
    width:74px;padding:6px 8px;border:1px solid var(--ink);background:var(--paper);
    font-family:var(--display);font-weight:600;font-size:14px;text-align:center;
    font-variant-numeric:tabular-nums;
  }
  #rollCount,#count{font-family:var(--display);font-weight:600;font-variant-numeric:tabular-nums;}

  .controls{display:grid;grid-template-columns:1fr 1fr;margin-top:0;border:1px solid var(--ink);}
  .controls button{
    background:var(--paper);border:0;border-right:1px solid var(--ink);padding:clamp(15px,2.6vh,24px) 0;
    font-weight:600;font-size:13px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;
  }
  .controls button:last-child{border-right:0;}
  .controls button:hover{background:var(--ink);color:var(--paper);}
  .btn-primary{background:var(--ink)!important;color:var(--paper)!important;}
  .btn-primary:hover{background:var(--paper)!important;color:var(--ink)!important;}

  /* ---------- categories ---------- */
  .list-head{
    display:flex;justify-content:space-between;align-items:center;gap:16px;
    padding:clamp(11px,1.7vh,18px) 32px;border-bottom:1px solid var(--ink);flex-shrink:0;
  }
  .list-head h2{
    margin:0;font-size:13px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;
  }
  .head-actions{display:flex;align-items:center;gap:10px;}
  .head-actions select,.ghost{
    border:1px solid var(--ink);background:var(--paper);padding:6px 10px;
    font-family:var(--mono);font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;
  }
  .ghost:hover{background:var(--ink);color:var(--paper);}

  ol.cats{
    list-style:none;margin:0;padding:0;counter-reset:c;
    height:100%;display:flex;flex-direction:column;
  }
  ol.cats li{
    counter-increment:c;display:flex;align-items:center;gap:18px;
    padding:0 32px;border-bottom:1px solid var(--rule);cursor:pointer;
    position:relative;overflow:hidden;flex:1;min-height:0;
  }
  ol.cats li:last-child{border-bottom:0;}
  ol.cats li:hover{background:var(--wash);}
  ol.cats li::after{
    content:"";position:absolute;inset:0;background:var(--ink);
    transform-origin:right center;transform:scaleX(1);
    transition:transform .5s cubic-bezier(.7,0,.2,1);
    transition-delay:calc(var(--i) * 55ms);
  }
  ol.cats li span,ol.cats li::before{
    opacity:0;transform:translateY(6px);
    transition:opacity .45s ease,transform .45s cubic-bezier(.2,.8,.2,1);
    transition-delay:calc(var(--i) * 55ms + 180ms);
  }
  ol.cats.revealed li::after{transform:scaleX(0);}
  ol.cats.revealed li span,ol.cats.revealed li::before{opacity:1;transform:none;}
  ol.cats:not(.revealed) li{cursor:default;pointer-events:none;}
  ol.cats:not(.revealed) li:hover{background:transparent;}
  @media (prefers-reduced-motion:reduce){
    ol.cats li::after,ol.cats li span,ol.cats li::before{transition-duration:.01ms;transition-delay:0ms;}
  }

  .veil{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    pointer-events:none;transition:opacity .3s ease;
  }
  .veil span{
    background:var(--ink);color:var(--paper);border:1px solid var(--paper);
    padding:16px 30px;font-family:var(--mono);font-weight:500;
    font-size:clamp(12px,1.6vh,15px);letter-spacing:.26em;text-transform:uppercase;
    text-indent:.26em;
  }
  .cats-wrap{position:relative;flex:1;min-height:0;}
  .cats-wrap.open .veil{opacity:0;}
  ol.cats li::before{
    content:counter(c,decimal-leading-zero);
    font-family:var(--mono);font-size:12px;color:var(--mute);min-width:26px;
  }
  ol.cats li span{font-size:clamp(14px,2.3vh,23px);font-weight:500;letter-spacing:-.01em;}
  ol.cats li.struck span{text-decoration:line-through;color:var(--mute);}
  ol.cats li.struck::before{color:var(--ink);}

  /* small screens fall back to a normal scrolling stack */
  @media (max-width:900px),(max-height:520px){
    html,body{height:auto;overflow:auto;}
    body{padding:12px;}
    .frame{height:auto;}
    .board{grid-template-columns:1fr;}
    .rail{border-right:0;border-bottom:1px solid var(--ink);}
    .letter{font-size:min(40vw,30vh);padding:18px 0;}
    ol.cats li{flex:0 0 auto;padding:14px 20px;}
    .list-head,footer{padding-left:20px;padding-right:20px;}
  }

  footer{
    padding:clamp(9px,1.4vh,15px) 32px;border-top:1px solid var(--ink);flex-shrink:0;
    font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--mute);
    display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;
  }
  kbd{
    font-family:var(--mono);border:1px solid var(--rule);padding:1px 5px;font-size:10.5px;color:var(--ink);
  }
</style>
</head>
<body>
<div class="frame">

  <header>
    <h1 class="wordmark">Scattergories</h1>
  </header>

  <div class="board">

    <div class="rail">
      <section class="letter-panel">
        <div class="panel-label"><span>Letter</span><span id="rollCount">Round 01</span></div>
        <div class="letter" id="letter" aria-live="polite"><span>A</span></div>
        <button class="reroll" id="rerollBtn">Reroll letter</button>
      </section>

      <section class="timer-panel">
        <div class="panel-label" style="color:var(--mute)"><span>Timer</span><span id="state">Ready</span></div>
        <div class="clock" id="clock">2:00</div>
        <div class="track"><div class="fill" id="fill"></div></div>

        <div class="presets" role="group" aria-label="Timer presets">
          <button data-sec="60" aria-pressed="false">1:00</button>
          <button data-sec="120" aria-pressed="true">2:00</button>
          <button data-sec="180" aria-pressed="false">3:00</button>
          <button data-sec="300" aria-pressed="false">5:00</button>
        </div>

        <div class="custom">
          <label for="mins">Custom</label>
          <input id="mins" type="number" min="0" max="59" value="2" aria-label="Minutes">
          <span class="tag">min</span>
          <input id="secs" type="number" min="0" max="59" value="0" aria-label="Seconds">
          <span class="tag">sec</span>
        </div>

        <div class="controls">
          <button id="startBtn" class="btn-primary">Start</button>
          <button id="resetBtn">Reset</button>
        </div>
      </section>
    </div>

    <div class="list-col">
      <div class="list-head">
        <h2>Categories</h2>
        <div class="head-actions">
          <select id="count" aria-label="Number of categories">
            <option value="10">10 items</option>
            <option value="12" selected>12 items</option>
            <option value="16">16 items</option>
          </select>
          <button class="ghost" id="newRound">New round</button>
        </div>
      </div>
      <div class="cats-wrap" id="catsWrap">
        <ol class="cats" id="cats"></ol>
        <div class="veil" id="veil"><span>Press start to reveal</span></div>
      </div>
    </div>

  </div>

  <footer>
    <span><kbd>N</kbd> new round · <kbd>L</kbd> reroll letter · <kbd>Space</kbd> start or pause · <kbd>R</kbd> reset</span>
    <span>Click a category to cross it off</span>
  </footer>
</div>

<script>
/* ---------------- letters ---------------- */
const LETTERS = "ABCDEFGHIJKLMNOPRSTW".split(""); // Q,U,V,X,Y,Z omitted

/* ---------------- categories ---------------- */
const CATEGORIES = [
"Things in a kitchen","Boys' names","Girls' names","Movie titles","Things that are cold",
"Types of drink","Musical instruments","Things you shout","School subjects","U.S. cities",
"Countries","Things in the sky","Animals","Things at a beach","Bodies of water",
"Occupations","Things that are round","Sports","Cartoon characters","Things in a park",
"Terms of endearment","Vegetables","Fruits","Things you wear","Things in a garage",
"Reasons to be late","Card and board games","Things that grow","Colors","Insects",
"Things at a circus","Excuses for missing work","Items in a suitcase","Historical figures","TV shows",
"Things that are sticky","Things you plug in","Things in a hospital","Restaurant names","Breakfast foods",
"Things in a desk drawer","Song titles","Farm animals","Ways to get around","Things that are loud",
"Store names","Tools","Things in a wallet","Weather words","Book titles",
"Things you save up for","Something you're afraid of","Things at a wedding","Household chores","Types of candy",
"Things in a first aid kit","Famous duos","Nicknames","Things that fly","Something you keep hidden",
"Parts of the body","Things in a toolbox","Video games","Types of dance","Things in a fridge",
"Something you replace","Ice cream flavors","Things you find on a map","Things made of metal","Halloween costumes",
"Things that smell good","Words on a menu","Something you collect","Types of shoes","Things in a purse",
"Board game pieces","Things that come in pairs","Kinds of birds","Trees and plants","Things in a bathroom",
"Sandwich fillings","Things that are sharp","Words shouted at a game","Reasons to call a friend","Things in a classroom",
"Cars and car brands","Something you rent","Types of bread","Things at a campsite","Words in a love song",
"Things you do at a party","Something people are allergic to","Kitchen appliances","Words that describe a person","Things in a museum",
"Types of cheese","Something you'd find under a bed","Magazines and newspapers","Things at an airport","Things you can throw",
"Ocean creatures","Things that come in a box","Something you do before bed","Types of weather","Words with double letters",
"Things at a picnic","Something you'd take camping","Famous landmarks","Things in a barn","Types of pasta",
"Something you do in the car","Things that beep","Words on a warning sign","Types of hats","Things in a sewing kit",
"Something wrapped in paper","Types of soup","Things you find in a forest","Things at a concert","Reasons to smile",
"Kinds of pain","Things that melt","Something you can't buy","Types of rocks","Streets and street names",
"Things in a gym","Something you inherited","Types of parties","Things in a spice rack","Things that need batteries",
"Words used in cooking","Things at a gas station","Something you'd never eat","Types of doctors","Things at a library",
"Something you fold","Winter activities","Things in a garden shed","Words that rhyme with each other","Things that are free",
"Types of hairstyles","Things you find in a pocket","Something you can stack","Types of stores at a mall","Words in a newspaper headline",
"Things you do at the beach","Something you can balance","Types of fabric","Things in an office","Something noisy at night",
"Kinds of pie","Things that make you sneeze","Types of bags","Things at a farmers market","Something you'd lose",
"Kinds of paper","Things you can pour","Types of lights","Something you'd take on a plane","Things that hang on a wall",
"Types of games","Things at a zoo","Something with buttons","Types of boats","Things you do with your hands",
"Words used at work","Something in a junk drawer","Kinds of sauces","Things that come in threes","Something you charge",
"Types of pets","Things that are frozen","Words on a road trip playlist","Something that spins","Things in a lunchbox"
];

/* ---------------- state ---------------- */
const $ = id => document.getElementById(id);
let total = 120, left = 120, ticking = false, timer = null, round = 0;

/* ---------------- categories render ---------------- */
function shuffle(a){
  const out = a.slice();
  for(let i=out.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[out[i],out[j]]=[out[j],out[i]];}
  return out;
}
function drawCategories(){
  const n = parseInt($("count").value,10);
  const picked = shuffle(CATEGORIES).slice(0,n);
  $("cats").innerHTML = picked.map((c,i)=>`<li style="--i:${i}"><span>${c}</span></li>`).join("");
  conceal();
}
function conceal(){
  $("cats").classList.remove("revealed");
  $("catsWrap").classList.remove("open");
}
function reveal(){
  $("cats").classList.add("revealed");
  $("catsWrap").classList.add("open");
}
$("cats").addEventListener("click", e=>{
  const li = e.target.closest("li");
  if(li) li.classList.toggle("struck");
});

/* ---------------- letter ---------------- */
let lastLetter = null;
let measureCtx = null;

/* Centers the glyph by its actual ink box, not its line box, so caps
   with no descender don't sit high in the panel. */
function centerLetter(){
  const el = $("letter"), span = el.querySelector("span");
  const cs = getComputedStyle(el);
  const size = parseFloat(cs.fontSize);
  const lineBox = parseFloat(cs.lineHeight) || size;
  if(!measureCtx) measureCtx = document.createElement("canvas").getContext("2d");
  measureCtx.font = `${cs.fontWeight} ${size}px ${cs.fontFamily}`;
  const m = measureCtx.measureText(span.textContent || "A");
  if(!m.fontBoundingBoxAscent){ span.style.transform = ""; return; }
  const halfLeading = (lineBox - (m.fontBoundingBoxAscent + m.fontBoundingBoxDescent)) / 2;
  const baseline = halfLeading + m.fontBoundingBoxAscent;
  const inkCenter = baseline - (m.actualBoundingBoxAscent - m.actualBoundingBoxDescent) / 2;
  span.style.transform = `translateY(${(lineBox / 2 - inkCenter).toFixed(2)}px)`;
}

function drawLetter(){
  let L;
  do { L = LETTERS[Math.floor(Math.random()*LETTERS.length)]; }
  while (L === lastLetter && LETTERS.length > 1);
  lastLetter = L;
  const el = $("letter");
  el.querySelector("span").textContent = L;
  el.classList.remove("roll"); void el.offsetWidth; el.classList.add("roll");
  centerLetter();
}

/* ---------------- timer ---------------- */
function fmt(s){
  const m = Math.floor(s/60), r = s%60;
  return m + ":" + String(r).padStart(2,"0");
}
function paint(){
  $("clock").textContent = fmt(left);
  $("fill").style.width = (total ? (left/total)*100 : 0) + "%";
  $("clock").classList.toggle("done", left === 0);
}
function setTotal(sec){
  total = Math.max(1, sec);
  left = total;
  stop();
  $("state").textContent = "Ready";
  paint();
}
function tick(){
  left--;
  if(left <= 0){ left = 0; paint(); stop(); $("state").textContent = "Time"; chime(); return; }
  paint();
}
function start(){
  if(ticking || left === 0) return;
  ticking = true;
  reveal();
  $("startBtn").textContent = "Pause";
  $("state").textContent = "Running";
  timer = setInterval(tick, 1000);
}
function stop(){
  ticking = false;
  clearInterval(timer);
  $("startBtn").textContent = "Start";
}
function toggle(){
  if(ticking){ stop(); $("state").textContent = "Paused"; }
  else start();
}
function reset(){
  left = total; stop(); conceal(); $("state").textContent = "Ready"; paint();
}

/* short buzzer */
function chime(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [0,0.32,0.64].forEach(t=>{
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = "square"; o.frequency.value = 320;
      o.connect(g); g.connect(ctx.destination);
      g.gain.setValueAtTime(0.0001, ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.18, ctx.currentTime+t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+t+0.26);
      o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+0.28);
    });
  }catch(e){}
}

/* ---------------- wiring ---------------- */
document.querySelectorAll(".presets button").forEach(b=>{
  b.addEventListener("click", ()=>{
    document.querySelectorAll(".presets button").forEach(x=>x.setAttribute("aria-pressed","false"));
    b.setAttribute("aria-pressed","true");
    const s = parseInt(b.dataset.sec,10);
    $("mins").value = Math.floor(s/60);
    $("secs").value = s%60;
    setTotal(s);
  });
});
function fromInputs(){
  const m = Math.min(59, Math.max(0, parseInt($("mins").value||0,10)));
  const s = Math.min(59, Math.max(0, parseInt($("secs").value||0,10)));
  document.querySelectorAll(".presets button").forEach(x=>{
    x.setAttribute("aria-pressed", String(parseInt(x.dataset.sec,10) === m*60+s));
  });
  setTotal(m*60+s);
}
$("mins").addEventListener("change", fromInputs);
$("secs").addEventListener("change", fromInputs);

$("startBtn").addEventListener("click", toggle);
$("resetBtn").addEventListener("click", reset);
$("count").addEventListener("change", ()=>{
  const wasOpen = $("cats").classList.contains("revealed");
  drawCategories();
  if(wasOpen) requestAnimationFrame(reveal);
});

function newRound(){
  round++;
  $("rollCount").textContent = "Round " + String(round).padStart(2,"0");
  drawLetter();
  drawCategories();
  reset();
}
$("newRound").addEventListener("click", newRound);
$("rerollBtn").addEventListener("click", drawLetter);

document.addEventListener("keydown", e=>{
  if(["INPUT","SELECT","TEXTAREA"].includes(e.target.tagName)) return;
  const k = e.key.toLowerCase();
  if(k === " " || e.code === "Space"){ e.preventDefault(); toggle(); }
  else if(k === "r"){ reset(); }
  else if(k === "n"){ newRound(); }
  else if(k === "l"){ drawLetter(); }
});

/* first round */
newRound();
window.addEventListener("resize", centerLetter);
if(document.fonts && document.fonts.ready) document.fonts.ready.then(centerLetter);
</script>
</body>
</html>
